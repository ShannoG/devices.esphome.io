bk72xx:
  board: generic-bk7238-tuya
  family: BK7238
esphome:
  name: pc191ha-gen4
  name_add_mac_suffix: true

wifi:
  ap:

button:
  - platform: restart
    name: Restart

sensor:
  - platform: bl0942
    uart_id: uart_bus
    current:
      name: BL0942 Current
    voltage:
      name: BL0942 Voltage
    power:
      name: BL0942 Power
      filters:
        multiply: -1
    energy:
      name: BL0942 Energy
    frequency:
      name: BL0942 Frequency
      accuracy_decimals: 2

light:
  - platform: status_led
    id: light_status
    pin: P8

binary_sensor:
  - platform: gpio
    id: binary_switch_1
    pin:
      number: P24
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - switch.toggle: switch_1

switch:
  - platform: gpio
    id: switch_1
    name: Relay 1
    pin: P26
    on_turn_on:
      - light.turn_on: light_status
    on_turn_off:
      - light.turn_off: light_status
    restore_mode: ALWAYS_ON

uart:
  id: uart_bus
  tx_pin: TX1
  rx_pin: RX1
  baud_rate: 4800
  stop_bits: 1
